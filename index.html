<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archer Bio Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="start-overlay" id="startOverlay" tabindex="0" role="button" aria-label="Click on me">
        <div class="start-overlay__text">Click on me</div>
    </div>
    <button class="theme-menu" id="themeMenuButton" type="button" aria-label="Themes" title="Themes">
        <svg class="theme-menu__icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M6 7h12v2H6z"></path>
            <path d="M6 11h12v2H6z"></path>
            <path d="M6 15h12v2H6z"></path>
        </svg>
    </button>
    <div class="theme-overlay" id="themeOverlay" aria-hidden="true">
        <div class="theme-panel" role="dialog" aria-modal="true" aria-label="Theme selector">
            <div class="theme-panel__title">Themes</div>
            <div class="theme-panel__list" id="themeList"></div>
            <button class="theme-panel__close" id="themeCloseButton" type="button">Close</button>
        </div>
    </div>
    <button class="bg-stop" id="bgStopButton" type="button" aria-label="Background" title="Background">
        <svg class="bg-stop__icon bg-stop__icon--stop" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M6 6h12v12H6z"></path>
        </svg>
        <svg class="bg-stop__icon bg-stop__icon--play" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M8 5v14l11-7z"></path>
        </svg>
    </button>
    <video loop playsinline preload="auto" class="video-background" id="backgroundVideo">
        <source src="" type="video/mp4" id="videoSource">
    </video>
    <div class="overlay"></div>
    <div class="container">
        <div class="avatar-container">
            <!-- Контейнер для изображения -->
            <div class="avatar-image" id="avatarImage"></div>
            <!-- Контейнер для видео -->
            <video class="avatar-video" id="avatarVideo" autoplay loop muted playsinline></video>
        </div>
        <div class="bio-text">Arͥcʜͣeͫr</div>
        <a href="#" class="button" data-open-modal="projectsModal">Проекты</a>
        <a href="#" class="button" data-open-modal="donatModal">Донат</a>
        <a href="https://t.me/teleroot" class="button">Связь со мной</a>
    </div>

    <!-- Donat Modal -->
    <div class="modal" id="donatModal">
        <div class="modal-content">
            <div class="modal-text">Реквизиты:</div>
            <div class="donation-content">
                <p><strong>💰 Crypto:</strong></p>
                <p><a href="https://app.tonkeeper.com/transfer/UQD-kzWDrVGX0QM8Itb_WF2FAvYjfDOKV6PqcQp3W0HdkC-T">Tonkeeper</a></p>
            </div>
            <a href="#" class="close-button" data-close-modal="donatModal">Закрыть</a>
        </div>
    </div>

    <!-- Projects Modal -->
    <div class="modal" id="projectsModal">
        <div class="modal-content">
            <div class="project-text">My Projects</div>
            <div class="project-content">
                <p><strong>👥 Channels:</strong></p>
                <p><a href="#">Мой канал</a></p>
                <p><a href="#">Мой канал️</a></p>
                <p><a href="#">Мой канал️</a></p>
                <p><strong>💬 Chats:</strong></p>
                <p><a href="#">Мой чат</a></p>
                <p><a href="#">Мой чат</a></p>
                <p><strong>🤖 Bots:</strong></p>
                <p><a href="#">Мой бот</a></p>
                <p><a href="#">Мой бот</a></p>
            </div>
            <a href="#" class="close-button" data-close-modal="projectsModal">Назад</a>
        </div>
    </div>

    <div class="music-control">
        <div class="disc" id="disc"></div>
        <span class="toggle-button" id="playPause">Play</span>
        <input type="range" min="0" max="1" step="0.1" value="0.3" class="music-slider" id="musicSlider">
        <span class="music-label">Музыка</span>
    </div>
    <audio id="backgroundMusic"></audio>
    <script src="script.js" defer></script>
</body>
</html>
